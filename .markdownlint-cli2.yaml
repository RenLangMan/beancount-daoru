# Markdownlint 配置
config:
  # 启用所有规则
  default: true

  # 忽略的规则
  MD013: false                    # 行长度（不限制）
  MD024: false                    # 重复的标题
  MD025: false                    # 多个顶级标题
  MD033: false                    # 允许内联 HTML
  MD041: false                    # 文件第一个标题要求
  MD046: false                    # 代码块风格

  # 自定义规则
  MD007:
    indent: 2                     # 列表缩进 2 空格
  MD009:
    br_spaces: 2                  # 行尾空格
  MD029:
    style: ordered               # 有序列表样式

# 忽略的文件
ignores:
  - "**/node_modules/**"
  - "**/.venv/**"
  - "**/__pycache__/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/.git/**"
  - "CHANGELOG.md"               # 自动生成的文件
  - "LICENSE.md"                 # 许可证文件

# 自动修复
fix: true

# 输出格式
output: stylish
