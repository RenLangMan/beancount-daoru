# 定义公共 CI 模板
.ci-template: &ci-template
  runner:
    tags: cnb:arch:amd64
    cpus: 24
  docker:
    build: .ide/Dockerfile
    volumes:
      - /root/.cache/uv
  before_script:
    # Dockerfile 已包含所有必要工具，此处仅做验证
    - |
      echo "🔍 验证工具可用性..."
      for tool in ruff basedpyright markdownlint-cli2 shellcheck shfmt pre-commit; do
        if command -v "$tool" &>/dev/null; then
          echo "✅ $tool: $(command -v $tool)"
        else
          echo "⚠️ $tool 未找到"
        fi
      done
    - echo "✅ 环境验证完成"
  stages:
    - name: Checks
      jobs:
        validate-title:
          if: '[ -n "$CNB_PULL_REQUEST_TITLE" ]'
          script: |
            title="$CNB_PULL_REQUEST_TITLE"
            if ! echo "$title" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|chore|build|ci|revert|types|scope)(\(.+\))?!?: .+'; then
              echo "❌ PR title 格式错误: $title"
              echo "✅ 应为: <type>(<scope>): <subject>"
              exit 1
            fi
            echo "✅ PR title 格式正确"

        markdownlint:
          script: markdownlint-cli2 "**/*.md" --fix

        ruff:
          script: |
            uv sync --group dev
            uv run ruff check --verbose
            uv run ruff format --check --diff --verbose

        shellcheck:
          script: |
            echo "🔍 运行 ShellCheck..."
            shellcheck scripts/*.sh --severity=warning
            echo "✅ ShellCheck 检查完成"

        shfmt:
          script: |
            echo "🔍 检查 Shell 脚本格式..."
            shfmt -d -sr scripts/*.sh  # 添加 -sr，与 pre-commit 一致
            echo "✅ shfmt 检查完成"

        uvlock:
          script: |
            uv lock
            uv lock --check

        basedpyright:
          script: |
            uv sync --extra llm --group dev
            uv run basedpyright --verbose

    - name: Test
      jobs:
        unit-tests:
          script: |
            uv sync --extra llm --group dev
            uv run pytest --verbose -m "not llm"
        llm-tests:
          script: |
            uv sync --extra llm --group dev
            uv run pytest --verbose -m "llm"

# main 分支配置
main:
  pull_request:
    - *ci-template

# feat/* 分支配置
"feat/*":
  push:
    - *ci-template
  pull_request:
    - *ci-template

# 发布流水线（Tag 触发）
"v*.*.*":
  tag_push:
    release:
      runner:
        tags: cnb:arch:amd64
      docker:
        image: python:3.12
      stages:
        - name: Build and Test
          script: |
            pip install uv build twine
            uv sync --extra llm --group dev
            uv run pytest --verbose -m "not llm"
            uv build
        - name: Publish
          script: |
            twine upload dist/*
          env:
            TWINE_USERNAME: __token__
            TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          artifacts:
            - dist/

# 云原生开发环境配置
$:
  vscode:
    clouddev:
      docker:
        # build: .ide/Dockerfile
        # 指定云原生开发启动时的基础镜像为当前镜像
        image: docker.cnb.cool/ysundy/beancount/beancount-daoru/beancount-daoru:latest
      runner:
        tags: cnb:arch:amd64
        cpus: 10
      # 添加环境变量配置
      env:
        LLAMA_MODEL: /opt/models/tinyllama.gguf # 默认测试模型
        LLAMA_HOST: 0.0.0.0
        LLAMA_PORT: 8080
        LLAMA_N_GPU_LAYERS: 0 # CPU 模式（CNB 环境通常无 GPU）
        LLAMA_CONTEXT_SIZE: 2048
      services:
        - vscode
        - docker
      stages:
        - name: Setup environment
          script: |
            set -e
            cd /workspace

            # 生成 .env（如果不存在）
            if [ ! -f .env ]; then
              cat > .env << "EOF"
            # .env - 环境配置文件

            # ===== UV 配置 =====
            export UV_LINK_MODE="copy"
            export UV_INDEX_URL="https://mirrors.cloud.tencent.com/pypi/simple/"
            export UV_CONCURRENT_DOWNLOADS=50
            export UV_CACHE_DIR="${HOME}/.cache/uv"

            # ===== 项目配置 =====
            export PROJECT_ROOT="/workspace"

            # ===== LLM (llama.cpp) 配置 =====
            # Linux/macOS 环境
            export IS_WINDOWS=false
            export LLAMA_MODEL_DIR="/opt/models"

            # ===== 模型文件配置 =====
            # 默认模型（用于一般使用）
            export LLAMA_MODEL="${LLAMA_MODEL_DIR}/tinyllama.gguf"

            # 测试模型（用于 pytest，优先级高于 LLAMA_MODEL）
            # Embedding 模型（用于向量嵌入测试）
            export TEST_EMBEDDING_MODEL="${LLAMA_MODEL_DIR}/embeddinggemma-300m-Q4_0.gguf"

            # Chat Completion 模型（用于对话补全测试）
            export TEST_CHAT_MODEL="${LLAMA_MODEL_DIR}/qwen3-4b-instruct-2507-iq4_nl.gguf"

            # 备用模型（当主模型不可用时使用）
            export TEST_FALLBACK_MODEL="${LLAMA_MODEL_DIR}/tinyllama.gguf"

            # 服务配置
            export LLAMA_HOST="0.0.0.0"
            export LLAMA_PORT="8080"

            # GPU 层数（CPU 模式设为 0，GPU 模式设为较大值如 99）
            export LLAMA_N_GPU_LAYERS="0"

            # 上下文大小
            export LLAMA_CONTEXT_SIZE="2048"
            EOF
              echo "✅ 已创建 .env"
            else
              echo "⏭️ .env 已存在，跳过创建"
            fi

            # 自动加载 .env 到 ~/.zshrc
            if ! grep -q "source /workspace/.env" ~/.zshrc 2>/dev/null; then
              echo "" >> ~/.zshrc
              echo "# Auto-load project environment" >> ~/.zshrc
              echo "source /workspace/.env" >> ~/.zshrc
              echo "✅ 已添加 .env 到 ~/.zshrc"
            fi

            # 加载当前会话环境变量（使用绝对路径）
            if [ -f /workspace/.env ]; then
              source /workspace/.env
              echo "✅ 已加载 .env 环境变量"
            else
              echo "⚠️ .env 文件不存在，跳过加载"
            fi

            # 安装项目依赖
            echo "📦 安装项目依赖（可能需要几分钟）..."
            uv sync --all-extras --dev --link-mode=copy
            echo "✅ 依赖安装完成"

            # 安装 pre-commit
            echo "🔧 安装 pre-commit..."
            uv tool install pre-commit --with pre-commit-uv || true
            if [ -d /workspace/.git ]; then
              pre-commit install || true
              pre-commit install --hook-type pre-push || true
              echo "✅ pre-commit 配置完成"
            else
              echo "⚠️ 不是 Git 仓库，跳过 pre-commit 安装"
            fi

        - name: Test llama-server
          script: |
            echo "🦙 测试 llama-server..."
            # 后台启动服务
            start-llama &
            # 等待服务就绪
            sleep 3
            status-llama
            # 测试 API
            if curl -s http://localhost:8080/health > /dev/null; then
              echo "✅ llama-server API 正常"
            else
              echo "⚠️ 健康检查端点不可用（可能版本差异）"
            fi
